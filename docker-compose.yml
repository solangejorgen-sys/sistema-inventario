services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventario-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: inventario_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - database
    networks:
      - inventario-net

  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventario-net

volumes:
  postgres_data:

networks:
  inventario-net:
    driver: bridge
